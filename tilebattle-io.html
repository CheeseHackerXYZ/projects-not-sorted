<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TileBattle</title>
<style>
body { font-family: sans-serif; }
#board {
  display: grid;
  grid-template-columns: repeat(10, 40px);
  grid-template-rows: repeat(10, 40px);
  gap: 2px;
}
.cell {
  width: 40px;
  height: 40px;
  font-size: 10px;
  text-align: center;
  line-height: 12px;
  border: 1px solid #999;
  cursor: pointer;
  position: relative;
}
.blink {
  animation: blinkAnim 0.8s infinite;
}
@keyframes blinkAnim {
  0% { filter: brightness(1.4); }
  50% { filter: brightness(1); }
  100% { filter: brightness(1.4); }
}
.player-border {
  border-top: 3px solid #800;
  border-left: 3px solid #800; /* 赤枠（敵プレイヤー） */
}
.player-border-self {
  border-top: 3px solid black; 
  border-left: 3px solid black; /* 自分の枠は青 */
}
</style>
</head>
<body>

<h2>TileBattle.io</h2>
<div>ターン: <span id="turn">0</span> / 100</div>
<div id="board"></div>
<h3>スコア</h3>
<div id="score"></div>
<a href="page1.html">kotti</a>
<script>
const SIZE = 10;
const TURN_MAX = 100;
const LEVEL_MAX = 10;
const VALUE_MIN = 50;
const VALUE_MAX = 200;
const NUM_PEOPLE = 4;

let turn = 0;
let board = [];
let players = [];
let selectedMove = null;

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function init() {
  // 盤面の初期化
  for (let y = 0; y < SIZE; y++) {
    board[y] = [];
    for (let x = 0; x < SIZE; x++) {
      board[y][x] = {
        value: randInt(VALUE_MIN, VALUE_MAX),
        owner: null,
        level: 0
      };
    }
  }

  let used = new Set();
  // プレイヤーの配置
  // --- 低valueマスを抽出 ---
  let allCells = [];
  
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      allCells.push({ x, y, value: board[y][x].value });
    }
  }
  
  // valueが低い順にソート
  allCells.sort((a, b) => a.value - b.value);
  
  // 下位NUM_PEOPLE個を取得
  let spawnCandidates = allCells.slice(0, NUM_PEOPLE);
  
  // ランダムシャッフル（Fisher-Yates）
  for (let i = spawnCandidates.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [spawnCandidates[i], spawnCandidates[j]] =
      [spawnCandidates[j], spawnCandidates[i]];
  }
  
  // プレイヤー配置
  for (let i = 0; i < NUM_PEOPLE; i++) {
    let { x, y } = spawnCandidates[i];
  
    board[y][x].owner = i;
    board[y][x].level = 1;
  
    players.push({ id: i, x, y });
  }
  
  draw();
  updateScore();
}

// 色をプレイヤーごとに設定
function color(id) {
  const colors = ["#4a90e2", "#e94a4a", "#4ae97b", "#e9d84a", "#b44ae9"];
  return colors[id % colors.length];
}

// 描画
function draw() {
  const b = document.getElementById("board");
  b.innerHTML = "";
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      let c = document.createElement("div");
      c.className = "cell";
      let cell = board[y][x];
      c.style.background = cell.owner === null ? "#eee" : color(cell.owner);
      // もし自分の領土であればレベル表示
      c.innerHTML = `${cell.value}<br>${cell.owner !== null ? 'Lv' + cell.level : ''}`;

      // プレイヤーの枠線を表示
      if (players[0].x === x && players[0].y === y) {
        c.classList.add("player-border-self"); // 自分の枠線は青
      }

      // 敵プレイヤーの枠線表示
      players.forEach(p => {
        if (p.id !== 0 && p.x === x && p.y === y) {
          c.classList.add("player-border"); // 敵プレイヤーの枠線は赤
        }
      });

      // 確定移動のセルを点滅
      if (selectedMove && selectedMove.x === x && selectedMove.y === y) {
        c.classList.add("blink");
      }

      c.onclick = () => handleClick(x, y);
      b.appendChild(c);
    }
  }
  document.getElementById("turn").innerText = turn;
}

// 目的の領土に到達できるマスを取得
function reachableTerritory(player) {
  let visited = new Set();
  let stack = [[player.x, player.y]];
  while (stack.length) {
    let [x, y] = stack.pop();
    let key = x + "," + y;
    if (visited.has(key)) continue;
    visited.add(key);
    [[1, 0], [-1, 0], [0, 1], [0, -1]].forEach(d => {
      let nx = x + d[0], ny = y + d[1];
      if (nx >= 0 && ny >= 0 && nx < SIZE && ny < SIZE) {
        if (board[ny][nx].owner === player.id) {
          stack.push([nx, ny]);
        }
      }
    });
  }
  return visited;
}

// 移動可能なマスを取得
function validMoves(player) {
  let reachable = reachableTerritory(player);
  let moves = [];
  reachable.forEach(k => {
    let [x, y] = k.split(",").map(Number);
    moves.push({ x, y });
    [[1, 0], [-1, 0], [0, 1], [0, -1]].forEach(d => {
      let nx = x + d[0], ny = y + d[1];
      if (nx >= 0 && ny >= 0 && nx < SIZE && ny < SIZE) {
        moves.push({ x: nx, y: ny });
      }
    });
  });
  return moves.filter(m => {
    return !players.some(p => p.x === m.x && p.y === m.y);
  });
}

// プレイヤーがクリックしたときの動作
function handleClick(x, y) {
  if (turn >= TURN_MAX) return;

  let player = players[0];
  let valid = validMoves(player);

  if (!valid.some(m => m.x === x && m.y === y)) {
    return; // 無効なマスは何もしない
  }

  // 同じマスをタップすると確定
  if (selectedMove && selectedMove.x === x && selectedMove.y === y) {
    executeTurn({ x, y });
    selectedMove = null;
  } else {
    // 新しい移動先を選択
    selectedMove = { x, y };
  }

  draw();
}

// CPUの移動処理
function cpuMove(player) {
  let moves = validMoves(player);
  if (moves.length === 0) return { x: player.x, y: player.y };

  if (Math.random()<0.9) {
    let best = null, bestVal = -1;
    moves.forEach(m => {
      let cell = board[m.y][m.x];
      let val = 0;
      if (cell.owner === null) val = cell.value * 0.5;
      else if (cell.owner === player.id && cell.level < LEVEL_MAX) val = cell.value * 0.2;
      else if (cell.owner !== player.id) {
        if (cell.level === 1) val = cell.value * 0.2;
        else val = cell.value * 0.1;
      }
      if (val > bestVal) { bestVal = val; best = m; }
    });
    return best;
  } else {
    return moves[randInt(0, moves.length - 1)];
  }
}

// ターンの実行
// ターンの実行（続き）
function executeTurn(playerMove) {
  turn++;

  let moves = [];
  players.forEach(p => {
    if (p.id === 0) moves[p.id] = playerMove;
    else moves[p.id] = cpuMove(p);
  });

  // 衝突処理
  let targetMap = {};
  players.forEach(p => {
    let m = moves[p.id];
    let key = m.x + "," + m.y;
    if (!targetMap[key]) targetMap[key] = [];
    targetMap[key].push(p.id);
  });

  players.forEach(p => {
    let m = moves[p.id];
    let key = m.x + "," + m.y;
    if (targetMap[key].length >= 2) {
      let cell = board[m.y][m.x];
      if (cell.owner === null) {
        moves[p.id] = { x: p.x, y: p.y }; // 戻る
      } else {
        let owner = cell.owner;
        if (p.id !== owner) {
          moves[p.id] = { x: p.x, y: p.y }; // 戻る
        }
      }
    }
  });

  // 実行
  players.forEach(p => {
    let m = moves[p.id];
    let cell = board[m.y][m.x];
    let oldX = p.x, oldY = p.y;

    p.x = m.x;
    p.y = m.y;

    if (cell.owner === null) {
      cell.owner = p.id;
      cell.level = 1;
    } else if (cell.owner === p.id) {
      if (cell.level < LEVEL_MAX) cell.level++;
    } else {
      cell.level--;
      if (cell.level <= 0) {
        cell.owner = p.id;
        cell.level = 1;
      } else {
        p.x = oldX;
        p.y = oldY;
      }
    }
  });

  draw();
  updateScore();

  if (turn === TURN_MAX) {
    alert("ゲーム終了！");
  }
}

// スコアの更新
function updateScore() {
  let scores = Array(NUM_PEOPLE).fill(0);
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      let c = board[y][x];
      if (c.owner !== null) {
        scores[c.owner] += c.value * c.level;
      }
    }
  }
  const scoreElement = document.getElementById("score");
  scoreElement.innerHTML = scores.map((s, i) => {
    return `<span style="color:${color(i)};">P${i + 1}: ${s}</span>`;
  }).join("<br>");
}

init();
</script>

</body>
</html>
