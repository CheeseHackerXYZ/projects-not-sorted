<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase Vocoder Spectrogram</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0e15;
            color: #e2e8f0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { font-size: 1.5rem; color: #a5b4fc; margin-bottom: 5px; }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 900px;
            width: 100%;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button, label {
            background-color: #1e293b;
            color: #fff;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        button:hover, label:hover { background-color: #334155; }
        input[type="file"] { display: none; }
        canvas {
            border: 1px solid #1e293b;
            background: #000;
            max-width: 100%;
            height: 512px; /* 描画データは1024pxですが表示は見やすく縮小 */
        }
        #status { font-size: 0.9rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Phase Vocoder Spectrogram</h1>
        <div id="status">画面をクリックしてシステムを有効化してください</div>
        
        <div class="controls">
            <button id="btnMic">マイク録音 開始</button>
            <button id="btnDownload">PNGでダウンロード</button>
            <label for="uploadImg">画像から音を復元</label>
            <input type="file" id="uploadImg" accept="image/*">
            <button id="btnPlay" disabled>復元した音を再生</button>
        </div>

        <canvas id="mainCanvas" width="800" height="1024"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        
        const btnMic = document.getElementById('btnMic');
        const btnDownload = document.getElementById('btnDownload');
        const uploadImg = document.getElementById('uploadImg');
        const btnPlay = document.getElementById('btnPlay');

        const width = canvas.width;
        const height = canvas.height; // 1024

        let audioCtx = null;
        let isRecording = false;
        let recordInterval = null;
        let reconstructedBuffer = null;

        const FFT_SIZE = 2048;
        const SAMPLE_RATE = 44100;
        const HOP_SIZE = 256; 

        // 前回の位相を記録して「位相の差分（瞬時周波数）」を計算するための配列
        let prevPhases = new Float32Array(FFT_SIZE / 2);

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = width;
        tempCanvas.height = height;
        const tempCtx = tempCanvas.getContext('2d');

        window.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                statusDiv.textContent = "準備完了。マイク録音するか、PNG画像を読み込んでください。";
            }
        });

        // --- 1. 音から画像化（振幅＋位相差の埋め込み） ---
        btnMic.addEventListener('click', async () => {
            if (!audioCtx) return;
            if (isRecording) {
                isRecording = false;
                clearInterval(recordInterval);
                btnMic.textContent = "マイク録音 開始";
                statusDiv.textContent = "録音停止。必ず「PNG」で保存してください。";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const source = audioCtx.createMediaStreamSource(stream);
                
                // 内部解析用のScriptProcessor（生データを取得して手動で位相を計算するため）
                const processor = audioCtx.createScriptProcessor(FFT_SIZE, 1, 1);
                
                source.connect(processor);
                processor.connect(audioCtx.destination);

                isRecording = true;
                btnMic.textContent = "録音中 (クリックで停止)";
                statusDiv.textContent = "フェーズボコーダー解析中...";

                // 簡易窓関数
                const windowFunc = new Float32Array(FFT_SIZE);
                for (let i = 0; i < FFT_SIZE; i++) {
                    windowFunc[i] = 0.5 * (1 - Math.cos((2 * Math.PI * i) / (FFT_SIZE - 1)));
                }

                // 定期的にCanvasへ右端から描画（擬似的なHOPタイミング）
                let sampleBuffer = [];

                processor.onaudioprocess = (e) => {
                    if (!isRecording) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    
                    // データをバッファリングしてHOP_SIZE(256)ごとに行列化
                    for(let i=0; i<inputData.length; i++) {
                        sampleBuffer.push(inputData[i]);
                        if (sampleBuffer.length >= FFT_SIZE) {
                            analyzeFrame(sampleBuffer.slice(0, FFT_SIZE), windowFunc);
                            sampleBuffer = sampleBuffer.slice(HOP_SIZE); // HOP分ずらす
                        }
                    }
                };

            } catch (err) {
                statusDiv.textContent = "マイクアクセスエラー: " + err.message;
            }
        });

        // 簡易FFT（複素数計算をインライン展開したディスクリートフーリエに近い処理）
        function analyzeFrame(frame, win) {
            const numFreqs = FFT_SIZE / 2;
            const magnitudes = new Float32Array(numFreqs);
            const phases = new Float32Array(numFreqs);

            // 窓関数の適用
            const windowed = new Float32Array(FFT_SIZE);
            for(let i=0; i<FFT_SIZE; i++) windowed[i] = frame[i] * win[i];

            // 相関演算によるリアルタイム周波数・位相抽出
            for (let f = 0; f < numFreqs; f++) {
                let real = 0;
                let imag = 0;
                const angleIncrement = (f / FFT_SIZE) * Math.PI * 2;
                
                for (let t = 0; t < FFT_SIZE; t++) {
                    const angle = angleIncrement * t;
                    real += windowed[t] * Math.cos(angle);
                    imag -= windowed[t] * Math.sin(angle);
                }

                magnitudes[f] = Math.sqrt(real * real + imag * imag);
                phases[f] = Math.atan2(imag, real);
            }

            // 画面シフト
            tempCtx.drawImage(canvas, 0, 0);
            ctx.clearRect(0, 0, width, height);
            ctx.drawImage(tempCanvas, -1, 0);

            // 1024ピクセルの縦ラインを描画
            const imgData = ctx.createImageData(1, height);

            for (let y = 0; y < height; y++) {
                const f = y; // 1:1マッピング
                
                // 1. 振幅（音の強さ） -> Rチャンネル
                const mag = Math.min(255, magnitudes[f] * 2000); 

                // 2. 位相差（前回のフレームからのズレ） -> Gチャンネル
                let phaseDiff = phases[f] - prevPhases[f];
                // -PI 〜 PI の範囲に正規化
                phaseDiff = Math.atan2(Math.sin(phaseDiff), Math.cos(phaseDiff));
                // 0〜255の整数にマッピング
                const phaseColor = Math.floor(((phaseDiff + Math.PI) / (Math.PI * 2)) * 255);

                const idx = (height - 1 - y) * 4;
                imgData.data[idx + 0] = mag;          // R: 振幅
                imgData.data[idx + 1] = phaseColor;   // G: 位相差
                imgData.data[idx + 2] = mag * 0.2;    // B: 視覚的な青み（復元には不使用）
                imgData.data[idx + 3] = 255;          // A: 不透明度

                prevPhases[f] = phases[f];
            }
            ctx.putImageData(imgData, width - 1, 0);
        }

        btnDownload.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'phase_vocoder.png';
            link.href = canvas.toDataURL('image/png'); // 必ずPNG
            link.click();
        });

        // --- 2. 画像から音へ完全復元 ---
        uploadImg.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, width, height);
                ctx.drawImage(img, 0, 0, width, height);
                statusDiv.textContent = "フェーズボコーダー画像を解析中...";
                
                setTimeout(() => { reconstructAudio(); }, 50);
            };
            img.src = URL.createObjectURL(file);
        });

        function reconstructAudio() {
            const imgData = ctx.getImageData(0, 0, width, height).data;
            const numFrames = width;
            const numFreqs = height; // 1024

            const totalSamples = numFrames * HOP_SIZE + FFT_SIZE;
            const outputSignal = new Float32Array(totalSamples);
            
            // 各周波数の現時点での累計位相を保持する配列
            const currentPhases = new Float32Array(numFreqs);

            // タイムラインを1フレーム（1ピクセル列）ずつ合成
            for (let x = 0; x < numFrames; x++) {
                const startSample = x * HOP_SIZE;

                for (let y = 0; y < numFreqs; y++) {
                    const idx = ((height - 1 - y) * width + x) * 4;
                    
                    // Rから振幅を復元
                    const mag = imgData[idx + 0] / 2000;
                    if (mag === 0) continue;

                    // Gから位相差を復元
                    const phaseColor = imgData[idx + 1];
                    const phaseDiff = (phaseColor / 255) * Math.PI * 2 - Math.PI;

                    // 位相を累積させて次の波へと連続的につなぐ
                    currentPhases[y] += phaseDiff;

                    const freqRad = (y / FFT_SIZE) * Math.PI * 2;

                    // サイン波をタイムラインにオーバーラップして加算
                    for (let t = 0; t < HOP_SIZE * 2; t++) {
                        if (startSample + t >= totalSamples) break;
                        
                        // ハニング窓をかけてフレーム間の繋ぎ目を滑らかに
                        const win = 0.5 * (1 - Math.cos((Math.PI * 2 * t) / (HOP_SIZE * 2)));
                        outputSignal[startSample + t] += mag * Math.sin(freqRad * t + currentPhases[y]) * win * 0.2;
                    }
                }
            }

            reconstructedBuffer = audioCtx.createBuffer(1, totalSamples, SAMPLE_RATE);
            reconstructedBuffer.copyToChannel(outputSignal, 0);

            btnPlay.disabled = false;
            statusDiv.textContent = "高精度復元が完了しました！再生してください。";
        }

        btnPlay.addEventListener('click', () => {
            if (!reconstructedBuffer || !audioCtx) return;
            const source = audioCtx.createBufferSource();
            source.buffer = reconstructedBuffer;
            source.connect(audioCtx.destination);
            source.start();
            statusDiv.textContent = "再生中...";
        });
    </script>
</body>
</html>
