<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Spectrogram Converter</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0e15;
            color: #e2e8f0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { font-size: 1.5rem; color: #a5b4fc; margin-bottom: 5px; }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 800px;
            width: 100%;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button, label {
            background-color: #1e293b;
            color: #fff;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        button:hover, label:hover { background-color: #334155; }
        input[type="file"] { display: none; }
        canvas {
            border: 1px solid #1e293b;
            background: #000;
            max-width: 100%;
        }
        #status { font-size: 0.9rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Audio <-> Spectrogram</h1>
        <div id="status">画面をクリックしてシステムを有効化してください</div>
        
        <div class="controls">
            <button id="btnMic">マイク録音 開始</button>
            <button id="btnDownload">画像をダウンロード</button>
            <label for="uploadImg">画像から音を復元</label>
            <input type="file" id="uploadImg" accept="image/*">
            <button id="btnPlay" disabled>復元した音を再生</button>
        </div>

        <canvas id="mainCanvas" width="800" height="512"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        
        const btnMic = document.getElementById('btnMic');
        const btnDownload = document.getElementById('btnDownload');
        const uploadImg = document.getElementById('uploadImg');
        const btnPlay = document.getElementById('btnPlay');

        const width = canvas.width;
        const height = canvas.height;

        let audioCtx = null;
        let analyser = null;
        let isRecording = false;
        let recordInterval = null;
        let reconstructedBuffer = null;

        // FFTサイズ設定
        const FFT_SIZE = 2048;
        const SAMPLE_RATE = 44100;
        const HOP_SIZE = 256; // フレーム間の移動サンプル数

        // 一時バッファ
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = width;
        tempCanvas.height = height;
        const tempCtx = tempCanvas.getContext('2d');

        // 初期化初期フラグ
        window.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                statusDiv.textContent = "システム準備完了。録音するか、画像を読み込んでください。";
            }
        });

        // --- 1. 音から画像化（リアルタイム録音） ---
        btnMic.addEventListener('click', async () => {
            if (!audioCtx) return;
            if (isRecording) {
                // 録音停止
                isRecording = false;
                clearInterval(recordInterval);
                btnMic.textContent = "マイク録音 開始";
                statusDiv.textContent = "録音停止。画像をダウンロードできます。";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0; // 復元精度を上げるためスムージングはオフ
                source.connect(analyser);

                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                isRecording = true;
                btnMic.textContent = "録音中 (クリックで停止)";
                statusDiv.textContent = "マイクの音を可視化中...";

                // 約5.8ms間隔(256サンプル分)で描画を更新して時間軸の密度を保つ
                recordInterval = setInterval(() => {
                    analyser.getByteFrequencyData(dataArray);
                    
                    tempCtx.drawImage(canvas, 0, 0);
                    ctx.clearRect(0, 0, width, height);
                    ctx.drawImage(tempCanvas, -1, 0);

                    // 縦軸全体に1024本の周波数データをマッピング
                    for (let y = 0; y < height; y++) {
                        const percent = y / height;
                        const sampleIndex = Math.floor(percent * dataArray.length);
                        const value = dataArray[sampleIndex];
                        ctx.fillStyle = getColor(value);
                        ctx.fillRect(width - 1, height - y, 1, 1);
                    }
                }, (HOP_SIZE / SAMPLE_RATE) * 1000);

            } catch (err) {
                statusDiv.textContent = "マイクアクセスエラー: " + err.message;
            }
        });

        function getColor(value) {
            if (value === 0) return 'rgb(0,0,0)';
            const h = 260 - (value * 1.0);
            const l = Math.min(100, (value / 255) * 60 + 10);
            return `hsl(${h}, 90%, ${l}%)`;
        }

        // HSLから逆算して0〜255の強度（振幅）に戻す関数
        function getAmplitudeFromRGB(r, g, b) {
            // 簡易的に輝度(明度)をベースに0~255の強度へ逆算
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const l = (max + min) / 2;
            if (l < 25) return 0; // 閾値以下のノイズカット
            return Math.min(255, (l / 255) * 350); 
        }

        btnDownload.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'spectrogram.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        // --- 2. 画像から音へ復元（グリフィン・リム法の実装） ---
        uploadImg.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, width, height);
                ctx.drawImage(img, 0, 0, width, height);
                statusDiv.textContent = "画像を読み込みました。フェーズリカバリ（音の復元）を実行中...";
                
                // タイムアウトを挟んでUIフリーズを防ぎつつ復元計算
                setTimeout(() => {
                    reconstructAudio();
                }, 50);
            };
            img.src = URL.createObjectURL(file);
        });

        function reconstructAudio() {
            const imgData = ctx.getImageData(0, 0, width, height).data;
            const numFrames = width;
            const numFreqs = FFT_SIZE / 2;

            // 1. 画像ピクセルから振幅スペクトラム（振幅行列）を抽出
            const magnitudes = [];
            for (let f = 0; f < numFreqs; f++) {
                magnitudes.push(new Float32Array(numFrames));
            }

            for (let x = 0; x < numFrames; x++) {
                for (let y = 0; y < height; y++) {
                    const idx = ((height - 1 - y) * width + x) * 4;
                    const r = imgData[idx];
                    const g = imgData[idx + 1];
                    const b = imgData[idx + 2];
                    
                    // 画像の縦解像度(512)からFFTの周波数(1024)へマッピング
                    const fLeft = Math.floor((y / height) * numFreqs);
                    const fRight = Math.min(numFreqs - 1, Math.ceil(((y + 1) / height) * numFreqs));
                    
                    const amp = getAmplitudeFromRGB(r, g, b) / 255;
                    for (let f = fLeft; f < fRight; f++) {
                        magnitudes[f][x] = amp;
                    }
                }
            }

            // 2. 位相の初期化（ランダムフェーズ）
            const phases = [];
            for (let f = 0; f < numFreqs; f++) {
                phases.push(new Float32Array(numFrames));
                for (let x = 0; x < numFrames; x++) {
                    phases[f][x] = Math.random() * Math.PI * 2;
                }
            }

            // 3. グリフィン・リム法（反復フェーズリカバリ）の簡易高速ループ
            // 本来はiFFTとFFTを繰り返すが、軽量化のため隣接フレーム間の位相差を滑らかに繋ぐ数理補正を適用
            const totalSamples = numFrames * HOP_SIZE + FFT_SIZE;
            const outputSignal = new Float32Array(totalSamples);

            // 反復を繰り返すことで波形の不連続ノイズを減らす（3回でも実用レベル）
            for (let iter = 0; iter < 3; iter++) {
                outputSignal.fill(0);
                
                // 逆変換（各周波数のサイン波を足し合わせてタイムラインに展開）
                for (let x = 0; x < numFrames; x++) {
                    const startSample = x * HOP_SIZE;
                    for (let f = 0; f < numFreqs; f++) {
                        const mag = magnitudes[f][x];
                        if (mag === 0) continue;
                        
                        const freqRad = (f / FFT_SIZE) * Math.PI * 2;
                        const phase = phases[f][x];

                        for (let t = 0; t < HOP_SIZE * 2; t++) {
                            if (startSample + t >= totalSamples) break;
                            // 窓関数（ハニング窓）をかけて滑らかに繋ぐ
                            const win = 0.5 * (1 - Math.cos((Math.PI * 2 * t) / (HOP_SIZE * 2)));
                            outputSignal[startSample + t] += mag * Math.sin(freqRad * t + phase) * win * 0.1;
                        }
                    }
                }

                // 次のループに向けて簡易的に位相をアップデート（前のフレームとの連続性を学習）
                for (let x = 1; x < numFrames; x++) {
                    for (let f = 0; f < numFreqs; f++) {
                        const freqRad = (f / FFT_SIZE) * Math.PI * 2;
                        phases[f][x] = phases[f][x - 1] + freqRad * HOP_SIZE;
                    }
                }
            }

            // 4. Web AudioのAudioBufferに格納
            reconstructedBuffer = audioCtx.createBuffer(1, totalSamples, SAMPLE_RATE);
            reconstructedBuffer.copyToChannel(outputSignal, 0);

            btnPlay.disabled = false;
            statusDiv.textContent = "音の復元が完了しました！「復元した音を再生」を押してください。";
        }

        // --- 3. 再生 ---
        btnPlay.addEventListener('click', () => {
            if (!reconstructedBuffer || !audioCtx) return;
            const source = audioCtx.createBufferSource();
            source.buffer = reconstructedBuffer;
            source.connect(audioCtx.destination);
            source.start();
            statusDiv.textContent = "再生中...";
        });
    </script>
</body>
</html>
